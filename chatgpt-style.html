<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eazee - F-C 13 Tech Dominator</title>
    <link rel="icon" href="eazee-logo.svg" type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #202123;
            border-right: 1px solid #2d2d30;
            display: flex;
            flex-direction: column;
            padding: 8px;
        }
        
        .sidebar-header {
            padding: 12px;
            margin-bottom: 8px;
        }
        
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #3d3d41;
            color: #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .new-chat-btn:hover {
            background: #2d2d30;
        }
        
        .chat-list {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 8px;
        }
        
        .chat-item {
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }
        
        .chat-item:hover {
            background: #2d2d30;
        }
        
        .chat-item.active {
            background: #2d2d30;
        }
        
        .chat-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #8e8ea0;
        }
        
        .message-count {
            font-size: 11px;
        }
        
        .chat-time {
            font-size: 11px;
        }
        
        .delete-chat {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            color: #8e8ea0;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .chat-item:hover .delete-chat {
            opacity: 1;
        }
        
        .delete-chat:hover {
            color: #ff4444;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8e8ea0;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .empty-state-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .empty-state-subtext {
            font-size: 14px;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            height: 60px;
            background: #1a1a1a;
            border-bottom: 1px solid #2d2d30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700 0%, #1E90FF 50%, #4169E1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: url('eazee-logo.svg') no-repeat center;
            background-size: contain;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 500;
            color: #e0e0e0;
        }
        
        .free-offer-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #3d3d41;
            color: #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .free-offer-btn:hover {
            background: #2d2d30;
        }
        
        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .welcome-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }
        
        .welcome-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .welcome-subtitle {
            font-size: 18px;
            color: #8e8ea0;
            margin-bottom: 32px;
        }
        
        .action-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .action-btn {
            padding: 12px 24px;
            background: #2d2d30;
            border: 1px solid #3d3d41;
            color: #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: #3d3d41;
            transform: translateY(-2px);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }
        
        .chat-messages.active {
            display: block;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        
        .message.user {
            align-items: flex-end;
        }
        
        .message.assistant {
            align-items: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.assistant .message-content {
            background: #2d2d30;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        
        .message-time {
            font-size: 11px;
            color: #8e8ea0;
            margin-top: 4px;
        }
        
        .message.user .message-time {
            text-align: right;
        }
        
        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: #2d2d30;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            max-width: 70%;
            font-size: 14px;
            color: #8e8ea0;
        }
        
        .typing-indicator.active {
            display: block;
        }
        
        .typing-dots {
            display: inline-block;
        }
        
        .typing-dots::after {
            content: '...';
            animation: typing 1.5s infinite;
        }
        
        @keyframes typing {
            0%, 60%, 100% { opacity: 1; }
            30% { opacity: 0.3; }
        }
        
        /* Input Container */
        .input-container {
            padding: 20px;
            border-top: 1px solid #2d2d30;
            display: none;
        }
        
        .input-container.active {
            display: block;
        }
        
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2d2d30;
            border: 1px solid #3d3d41;
            border-radius: 12px;
            padding: 12px 16px;
        }
        
        .message-input {
            flex: 1;
            background: none;
            border: none;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            resize: none;
            max-height: 120px;
        }
        
        .message-input::placeholder {
            color: #8e8ea0;
        }
        
        .input-actions {
            display: flex;
            gap: 8px;
        }
        
        .input-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            color: #8e8ea0;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .input-btn:hover {
            background: #3d3d41;
            color: #e0e0e0;
        }
        
        .input-btn.recording {
            color: #ff4444;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .send-btn {
            background: #667eea;
            color: white;
        }
        
        .send-btn:hover {
            background: #5a6fd8;
        }
        
        .send-btn:disabled {
            background: #3d3d41;
            color: #8e8ea0;
            cursor: not-allowed;
        }
        
        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #2d2d30;
            border: 1px solid #3d3d41;
            color: #e0e0e0;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }
        
        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #3d3d41;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #4d4d51;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <button id="newChatButton" class="new-chat-btn">+ New Chat</button>
        </div>
        
        <div id="chatList" class="chat-list">
            <!-- Chat items will be rendered dynamically -->
        </div>
        
        <div class="sidebar-footer">
            <button id="saveChatButton" class="new-chat-btn">💾 Save Chat</button>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <div class="logo-container">
                <div class="logo-icon"></div>
                <div class="logo">Eazee</div>
                <div id="chatTitle" class="header-title">F-C 13 Tech Dominator (20% ChatGPT Intelligence)</div>
            </div>
            <button class="free-offer-btn">Free offer</button>
        </div>
        
        <div class="chat-container">
            <div id="welcomeMessage" class="welcome-message">
                <div class="welcome-title">Where should we begin?</div>
                <div class="welcome-subtitle">Ask anything, get your answer instantly</div>
                <div class="action-buttons">
                    <button class="action-btn" onclick="startNewChat()">➤ Ask anything</button>
                    <button class="action-btn" onclick="window.uiRenderer.showNotification('Voice input coming soon!')">🎤</button>
                </div>
            </div>
            
            <div id="chatMessages" class="chat-messages">
                <!-- Messages will be rendered dynamically -->
            </div>
            
            <div id="typingIndicator" class="typing-indicator">
                <span class="typing-dots">F-C 13 Tech Dominator is thinking</span>
            </div>
            
            <div id="inputContainer" class="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" class="message-input" placeholder="Ask anything..." rows="1"></textarea>
                    <div class="input-actions">
                        <button id="micButton" class="input-btn" style="display: none;">🎤</button>
                        <button id="sendButton" class="input-btn send-btn">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Load Modules -->
    <script src="js/storage.js"></script>
    <script src="js/messageHandler.js"></script>
    <script src="js/uiRenderer.js"></script>
    <script src="js/chatManager.js"></script>
    
    <!-- Initialize Application -->
    <script>
        function startNewChat() {
            if (window.chatManager) {
                window.chatManager.createNewChat();
            } else {
                console.error('Chat manager not initialized');
            }
        }
        
        // Initialize application when DOM is loaded
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // Create instances
                const messageHandler = new MessageHandler();
                const uiRenderer = new UIRenderer();
                const chatManager = new ChatManager(storage, messageHandler, uiRenderer);
                
                // Make instances globally available
                window.storage = storage;
                window.messageHandler = messageHandler;
                window.uiRenderer = uiRenderer;
                window.chatManager = chatManager;
                
                // Initialize voice input
                const voiceHandler = new VoiceInputHandler((transcript) => {
                    uiRenderer.setInputValue(transcript);
                    chatManager.sendMessage(transcript);
                });
                uiRenderer.setVoiceInputHandler(voiceHandler);
                
                // Initialize chat system
                await chatManager.initialize();
                
                console.log('✅ Eazee F-C 13 Tech Dominator initialized successfully');
                
            } catch (error) {
                console.error('❌ Error initializing application:', error);
                const uiRenderer = new UIRenderer();
                uiRenderer.showNotification('Error initializing application. Please refresh the page.');
            }
        });
        
        // Handle window resize
        window.addEventListener('resize', () => {
            if (window.chatManager) {
                window.uiRenderer.scrollToBottom();
            }
        });
        
        // Handle visibility change
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && window.chatManager) {
                // Refresh data when page becomes visible again
                window.chatManager.loadChats();
            }
        });
    </script>
</body>
</html>
