<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eazee - Login</title>
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d30 100%);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: #2d2d30;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid #3d3d41;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-text {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700 0%, #1E90FF 50%, #4169E1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #8e8ea0;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #3d3d41;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            border-color: #667eea;
        }
        
        .form-input.error {
            border-color: #ff4444;
        }
        
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #3d3d41;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            transition: width 0.3s, background-color 0.3s;
            width: 0%;
        }
        
        .password-strength-bar.weak {
            background: #ff4444;
            width: 33%;
        }
        
        .password-strength-bar.medium {
            background: #ffaa00;
            width: 66%;
        }
        
        .password-strength-bar.strong {
            background: #44ff44;
            width: 100%;
        }
        
        .password-hint {
            margin-top: 8px;
            font-size: 12px;
            color: #8e8ea0;
        }
        
        .error-message {
            color: #ff4444;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        
        .success-message {
            color: #44ff44;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }
        
        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
        }
        
        .login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #8e8ea0;
        }
        
        .signup-link a {
            color: #667eea;
            text-decoration: none;
        }
        
        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-text">Eazee</div>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                <div class="error-message" id="emailError"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" class="form-input" placeholder="Choose a username" required>
                <div class="error-message" id="usernameError"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="birthdate">Date of Birth</label>
                <input type="date" id="birthdate" class="form-input" required>
                <div class="error-message" id="ageError"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Create a strong password" required>
                <div class="password-strength">
                    <div class="password-strength-bar" id="passwordStrengthBar"></div>
                </div>
                <div class="password-hint" id="passwordHint">Password must be at least 8 characters with uppercase, lowercase, numbers, and symbols</div>
                <div class="error-message" id="passwordError"></div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="otp">Email Verification (OTP)</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="otp" class="form-input" placeholder="Enter 6-digit OTP" maxlength="6" style="flex: 1;">
                    <button type="button" class="login-button" id="sendOtpBtn" style="flex: 0 0 auto; padding: 12px 20px;">Send OTP</button>
                </div>
                <div class="error-message" id="otpError"></div>
                <div class="success-message" id="otpSuccess"></div>
            </div>
            
            <button type="submit" class="login-button" id="loginButton">Sign Up & Login</button>
        </form>
        
        <div class="signup-link">
            Already have an account? <a href="#">Sign in</a>
        </div>
    </div>
    
    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const usernameInput = document.getElementById('username');
        const birthdateInput = document.getElementById('birthdate');
        const passwordInput = document.getElementById('password');
        const loginButton = document.getElementById('loginButton');
        
        // Password strength checker
        function checkPasswordStrength(password) {
            let strength = 0;
            const hints = [];
            
            if (password.length >= 8) {
                strength += 25;
            } else {
                hints.push('at least 8 characters');
            }
            
            if (/[a-z]/.test(password)) {
                strength += 25;
            } else {
                hints.push('lowercase letters');
            }
            
            if (/[A-Z]/.test(password)) {
                strength += 25;
            } else {
                hints.push('uppercase letters');
            }
            
            if (/[0-9]/.test(password)) {
                strength += 25;
            } else {
                hints.push('numbers');
            }
            
            if (/[^a-zA-Z0-9]/.test(password)) {
                strength += 10;
            } else {
                hints.push('symbols');
            }
            
            return { strength, hints };
        }
        
        // Age checker
        function checkAge(birthdate) {
            const today = new Date();
            const birthDate = new Date(birthdate);
            let age = today.getFullYear() - birthDate.getFullYear();
            const monthDiff = today.getMonth() - birthDate.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }
            
            return age;
        }
        
        // Email validation
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        // Username validation
        function validateUsername(username) {
            const re = /^[a-zA-Z0-9_]{3,20}$/;
            return re.test(username);
        }
        
        // Real-time validation
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            const { strength, hints } = checkPasswordStrength(password);
            const strengthBar = document.getElementById('passwordStrengthBar');
            const passwordHint = document.getElementById('passwordHint');
            
            strengthBar.className = 'password-strength-bar';
            
            if (strength < 50) {
                strengthBar.classList.add('weak');
                passwordHint.textContent = `Weak password. Add: ${hints.join(', ')}`;
                passwordHint.style.color = '#ff4444';
            } else if (strength < 75) {
                strengthBar.classList.add('medium');
                passwordHint.textContent = 'Medium strength. Consider adding symbols for more security.';
                passwordHint.style.color = '#ffaa00';
            } else {
                strengthBar.classList.add('strong');
                passwordHint.textContent = 'Strong password! ✅';
                passwordHint.style.color = '#44ff44';
            }
        });
        
        // Form submission
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(msg => msg.style.display = 'none');
            document.querySelectorAll('.form-input').forEach(input => input.classList.remove('error'));
            
            let isValid = true;
            
            // Validate email
            if (!validateEmail(emailInput.value)) {
                document.getElementById('emailError').textContent = 'Please enter a valid email address';
                document.getElementById('emailError').style.display = 'block';
                emailInput.classList.add('error');
                isValid = false;
            }
            
            // Validate username
            if (!validateUsername(usernameInput.value)) {
                document.getElementById('usernameError').textContent = 'Username must be 3-20 characters (letters, numbers, underscore only)';
                document.getElementById('usernameError').style.display = 'block';
                usernameInput.classList.add('error');
                isValid = false;
            }
            
            // Validate age
            const age = checkAge(birthdateInput.value);
            if (age < 13) {
                document.getElementById('ageError').textContent = 'You must be at least 13 years old to register';
                document.getElementById('ageError').style.display = 'block';
                birthdateInput.classList.add('error');
                isValid = false;
            }
            
            // Validate password
            const { strength } = checkPasswordStrength(passwordInput.value);
            if (strength < 75) {
                document.getElementById('passwordError').textContent = 'Password is not strong enough';
                document.getElementById('passwordError').style.display = 'block';
                passwordInput.classList.add('error');
                isValid = false;
            }
            
            if (isValid) {
                // Save user data to localStorage
                const userData = {
                    email: emailInput.value,
                    username: usernameInput.value,
                    birthdate: birthdateInput.value,
                    age: age,
                    registeredAt: new Date().toISOString()
                };
                
                localStorage.setItem('eazee_user', JSON.stringify(userData));
                
                // Redirect to main app
                window.location.href = 'clone.html';
            }
        });
        
        // Check if user is already logged in
        window.addEventListener('load', function() {
            const user = localStorage.getItem('eazee_user');
            if (user) {
                window.location.href = 'clone.html';
            }
        });
    </script>
</body>
</html>
